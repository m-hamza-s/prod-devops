apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prod-devops
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/m-hamza-s/prod-devops.git
    targetRevision: main
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true

